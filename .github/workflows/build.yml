name: Build geosite.dat
on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "data/**"
    #paths-ignore:
    #  - "README.md"
    #  - ".gitignore"
    #  - "LICENSE"
    #  - "**/dependabot.yml"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Checkout geosite builder
        uses: actions/checkout@v6
        with:
          repository: v2fly/domain-list-community
          path: community
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: community/go.mod
          cache: true
          cache-dependency-path: community/go.sum
          
      - name: Set tag
        run: |
          DAILY_TAG=$(date +%Y%m%d%H%M)
          echo "DAILY_TAG=$DAILY_TAG" >> $GITHUB_ENV
          
      - name: Create Tag
        uses: actions/github-script@v7
        with:
          script: |
            const {DAILY_TAG} = process.env
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${DAILY_TAG}`,
              sha: context.sha
            })

      - name: Build geosite.dat
        run: |
          set -euo pipefail

          rm -rf community/data /tmp/out
          mkdir -p community/data /tmp/out

          cp -a ./data/. community/data/

          pushd community >/dev/null
          go run ./ -outputdir=/tmp/out
          popd >/dev/null

          test -s /tmp/out/dlc.dat
          cp -f /tmp/out/dlc.dat ./geosite.dat

      - name: Move files to publish directory
        run: |
          mkdir publish
          mv ./*.dat publish
          
      - name: Git push assets to "release" branch
        run: |
          cd publish || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add -A
          git commit -m "${{ env.DAILY_TAG }}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u origin release

          
      - name: Purge jsdelivr CDN
        run: |
          cd publish || exit 1
          for file in $(ls); do
            curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/${file}"
          done
          
      - name: Publish release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.DAILY_TAG }}
          name: ${{ env.DAILY_TAG }}
          prerelease: false
          draft: false
          files: "publish/*"
