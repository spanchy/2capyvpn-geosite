name: Build geosite
on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "data/**"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Checkout geosite builder
        uses: actions/checkout@v6
        with:
          repository: v2fly/domain-list-community
          path: community
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: community/go.mod
          cache: true
          cache-dependency-path: community/go.sum

      - name: Set tag
        if: github.ref_name == 'master'
        run: |
          DAILY_TAG=$(date +%Y%m%d%H%M)
          echo "DAILY_TAG=$DAILY_TAG" >> $GITHUB_ENV

      - name: Create Tag
        if: github.ref_name == 'master'
        uses: actions/github-script@v8
        with:
          script: |
            const { DAILY_TAG } = process.env
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${DAILY_TAG}`,
              sha: context.sha
            })

      - name: Build geosite.dat
        run: |
          set -euo pipefail

          rm -rf /tmp/out /tmp/data-min
          mkdir -p /tmp/out /tmp/data-min

          cd community
          echo category-ru > /tmp/needed

          awk '
            FNR==NR {need[$0]; next}
            $0 ~ /^include:/ {
              name = substr($0,9)
              gsub(/\r/,"",name)
              print name
            }
            ' /tmp/needed data/* | sort -u >> /tmp/needed
         
          while IFS= read -r f; do
            if [ -f "data/$f" ]; then
              cp "data/$f" /tmp/data-min/
            else
              echo "skip missing: $f"
            fi
            done < /tmp/needed

          cd ..
          
          cat data/category-ru >> /tmp/data-min/category-ru
          rm -rf community/data
          mv /tmp/data-min community/data

          pushd community >/dev/null
          go run ./ -outputdir=/tmp/out
          popd >/dev/null

          cp /tmp/out/dlc.dat geosite.dat

      - name: Move files to publish directory
        if: github.ref_name == 'master'
        run: |
          set -euo pipefail
          rm -rf release
          rm -rf /tmp/release
          mkdir release
          cp ./geosite.dat release/
          sha256sum release/geosite.dat > release/geosite.dat.sha256
          cp -r release /tmp/release

      - name: Git push assets to "release" branch
        if: github.ref_name == 'master'
        run: |
          cd release || exit 1
          git init
          git config --local user.name "spanchy"
          git config --local user.email "spanchy@users.noreply.github.com"
          git checkout -b release
          git add -A
          git commit -m "Release ${{ env.DAILY_TAG }}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u origin release
          cd .. || exit 1
          git config --local user.name "spanchy"
          git config --local user.email "spanchy@users.noreply.github.com"
          git checkout master
          rm -rf release
          cp -r /tmp/release ./release
          git add release/
          git commit -m "Release ${{ env.DAILY_TAG }}" || echo "No changes to commit"
          git push origin master

      - name: Purge jsdelivr CDN
        if: github.ref_name == 'master'
        run: |
          set -euo pipefail
          cd release || exit 1
          find . -type f -print0 | while IFS= read -r -d '' f; do
            rel="${f#./}"
            curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/${rel}"
          done

      - name: Publish release
        if: github.ref_name == 'master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.DAILY_TAG }}
          name: ${{ env.DAILY_TAG }}
          prerelease: false
          draft: false
          files: |
            release/geosite.dat
            release/geosite.dat.sha256
